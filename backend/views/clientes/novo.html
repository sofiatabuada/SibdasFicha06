<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="../../assets/img/gym125.png" type="image/png">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome (local) -->
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">

    <!-- estilos -->
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>

<body>
    <!-- Navbar -->
    <header class="bng-navbar-menu">

        <div>
            <!-- Logo e Nome -->
            <a href="../../index.html">
                <img src="../../assets/img/gym125_white.png" alt="Logo do ISEP Ginásio">
            </a>
            <h3>ISEP Ginásio</h3>
        </div>

        <div>
            <button>Utilizador</button>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="lista.html"><i class="fas fa-users"></i> &ensp; Clientes</a>
            <a href="../agendamento/agendamento.html"><i class="fas fa-calendar-alt"></i> &ensp; Agendamento de
                treinos</a>
            <a href="../plano_treino/plano_treino.html"><i class="fas fa-dumbbell"></i> &ensp; Planos de Treino</a>
            <a href="../equipamentos/equipamentos.html"><i class="fas fa-cogs"></i> &ensp; Equipamentos</a>
            <a href="../produtos_servicos/produtos_servicos.html"><i class="fas fa-box-open"></i> &ensp; Produtos e
                Serviços</a>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <div class="form-wrapper">
        <h2><strong><i class="fa-solid fa-users"></i> Inserir novo cliente</strong></h2>
        <hr>
        <form action="#" method="post" novalidate>
            <div class="form-group">
                <label for="texto_nome">Nome Completo</label>
                <input type="text" name="nome_cliente" id="texto_nome" required>
            </div>
            <div class="form-group">
                <label for="texto_endereco">Morada <small>(NºPorta, Andar)</small></label>
                <input type="text" name="morada_cliente" id="texto_endereco">
            </div>
            <div class="form-group">
                <label for="texto_cp">Código Postal</label>
                <input type="text" name="cp_cliente" id="texto_cp" required>
            </div>
            <div class="form-group">
                <label for="texto_cidade">Cidade</label>
                <input type="text" name="cid_cliente" id="texto_cidade" required>
            </div>
            <div class="form-group">
                <label for="texto_cliente">Telefone</label>
                <input type="text" name="tel_cliente" id="texto_cliente" required>
            </div>
            <div class="form-group">
                <label for="texto_email">Email</label>
                <input type="email" name="email_cliente" id="texto_email" required>
            </div>
            <div class="form-group">
                <label>Sexo</label><br>
                <input type="radio" name="radio_gender" id="radio_m" value="m" checked>
                <label for="radio_m">Masculino</label>
                <input type="radio" name="radio_gender" id="radio_f" value="f">
                <label for="radio_f">Feminino</label>
            </div>
            <div class="form-group">
                <label for="texto_dnasc">Data de nascimento</label>
                <input type="text" name="dnasc_cliente" id="texto_dnasc" required>
            </div>
            <div class="form-group">
                <label for="texto_estcivil">Estado Civil</label>
                <select name="estaciv_cliente" id="texto_estcivil">
                    <option selected>Escolha uma opção</option>
                    <option value="solt">Solteiro</option>
                    <option value="casd">Casado</option>
                    <option value="ufat">União de Facto</option>
                </select>
            </div>
            <div class="form-group">
                <label for="texto_SSaude">Sistema de Saúde</label>
                <input type="text" name="campo_opcao" id="texto_SSaude" list="sistemasaude">
                <datalist id="sistemasaude">
                    <option value="SNS">
                    <option value="ADSE">
                    <option value="SMAS">
                    <option value="CTT">
                    <option value="PSP">
                </datalist>
            </div>
            <div class="form-buttons">
                <a href="lista.html"><i class="fa-solid fa-xmark"></i> Cancelar</a>
                <button type="submit"><i class="fa-regular fa-floppy-disk"></i> Guardar</button>
            </div>
            <div class="alert text-center">
                Erro simples
            </div>
        </form>
    </div>

</body>

</html>
